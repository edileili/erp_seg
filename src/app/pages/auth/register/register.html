<div>
    <div class="mb-4 p-8">
            <p-card header="Registro">
                <p class="m-0">
                    Registrate ahora mismo
                </p>
            </p-card>
        </div>
    <form action="" method="post">
        <div class="form-group">
            <label for="my-input">Nombre de Usuario</label>
            <p-inputgroup>
                <input pInputText placeholder="Ej: Sergio" />
            </p-inputgroup>
        </div>
        <div class="form-group">
            <label for="my-input">Correo</label>
            <p-inputgroup>
                <input pInputText placeholder="Correo" />
            </p-inputgroup>
        </div>
        <div class="form-group">
            <label for="my-input">Contraseña</label>
            <p-inputgroup>
                <input pInputText placeholder="Contraseña" />
            </p-inputgroup>
        </div>
        <p-button 
            label="Iniciar Sesión"
            
            severity="success"
            [raised]="true"
            [rounded]="true">
      </p-button>
    </form>
</div>
