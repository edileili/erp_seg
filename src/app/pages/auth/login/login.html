<div class="container-erp">
    <div class="mb-4 p-8">

        <div class="login-container">
            <h1 class="title-erp">Inicia Sesión</h1>
            <p-card>
                <form [formGroup]="loginSeg" (ngSubmit)="onSubmit()">
                    <div class="form-login">
                        <div class="form-group">
                            <label for="email">Correo</label>
                            <p-inputgroup>
                                <p-inputgroup-addon>
                                    <i class="pi pi-envelope"></i>
                                </p-inputgroup-addon>
                                <input pInputText id="email" formControlName="email" name="email"
                                    placeholder="ejemplo@correo.com" [class.ng-invalid]="isInvalid('email')"
                                    [class.ng-dirty]="isInvalid('email')" />
                            </p-inputgroup>
                            @if (isInvalid('email')) {
                            <small class="p-error" style="color: red;">El correo es obligatorio y debe ser
                                válido.</small>
                            }
                        </div>

                        <div class="form-group">
                            <label for="contrasenia">Contraseña</label>
                            <p-inputgroup>
                                <p-inputgroup-addon>
                                    <i class="pi pi-lock"></i>
                                </p-inputgroup-addon>
                                <input pInputText type="password" id="contrasenia" name="contrasenia"
                                    formControlName="contrasenia" placeholder="Tu contraseña"
                                    [class.ng-invalid]="isInvalid('contrasenia')"
                                    [class.ng-dirty]="isInvalid('contrasenia')" />
                            </p-inputgroup>
                            @if (isInvalid('contrasenia')) {
                            <small class="p-error" style="color: red;">La contraseña debe tener al menos 10
                                caracteres.</small>
                            }
                        </div>
                        <div class="info-register">
                            <small>¿No tienes cuenta? Registrate <a href="/register">aquí.</a></small>
                        </div>

                        <div class="form-group form-button">
                            <p-button type="submit" label="Ingresar" severity="success" [raised]="true"
                                [rounded]="true">
                            </p-button>
                        </div>
                    </div>

                </form>
            </p-card>
        </div>
    </div>
</div>
